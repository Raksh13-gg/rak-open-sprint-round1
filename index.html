<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brain Cell Analyzer</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

</head>

<body>

<h1>🧠 Brain Cell Analyzer</h1>
<h3>Advanced Artificial Intelligence Scanner</h3>

<p>Scanning your brain to see how many cells survived today.</p>

<div class="container">

<div class="camera-box">

<div id="video"></div>

<div class="scan-line"></div>

</div>

<button id="scanButton">Scan Your Brain</button>

<div id="progressBar">
<div id="progress"></div>
</div>

<div id="result"></div>

<img id="meme" src="" alt="relatable meme">

</div>

<audio id="beepSound" src="beep.mp3"></audio>

<button id="resetButton">Reset to scan your brain!!!!</button>
<button id = "shareBtn">Share on WhatsApp</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/webcamjs/1.0.26/webcam.min.js"></script>
<script src = "https://cdn.jsdelivr.net/npm/face-api.js"></script>
<script src="script.js"></script>

</body>
</html>
